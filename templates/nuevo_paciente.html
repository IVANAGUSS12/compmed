{% extends 'base.html' %} {% block title %}Nuevo paciente · MedControl{%
endblock %} {% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card">
      <div class="card-header bg-primary text-white fw-bold">
        <i class="fas fa-user-plus me-2"></i>Nuevo paciente
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label fw-semibold">Apellido y nombre *</label>
              <input
                type="text"
                name="nombre"
                class="form-control"
                required
                placeholder="Apellido, Nombre"
              />
            </div>
            <div class="col-sm-6">
              <label class="form-label fw-semibold">DNI</label>
              <input type="text" name="dni" class="form-control" />
            </div>
            <div class="col-sm-6">
              <label class="form-label fw-semibold">Fecha ingreso</label>
              <input
                type="text"
                name="fecha_ingreso"
                class="form-control"
                placeholder="dd/mm/aaaa"
              />
            </div>
            <div class="col-sm-6">
              <label class="form-label fw-semibold">Fecha egreso</label>
              <input
                type="text"
                name="fecha_egreso"
                class="form-control"
                placeholder="dd/mm/aaaa"
              />
            </div>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-save me-1"></i>Guardar paciente
            </button>
            <a href="{{ url_for('index') }}" class="btn btn-outline-secondary"
              >Cancelar</a
            >
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
