<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}MedControl{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f0f4f8; font-size: .94rem; }
    .navbar { background: #1a3a5c !important; }
    .navbar-brand { font-weight: 700; letter-spacing: 1px; color: #fff !important; font-size: 1.2rem; }
    .card { border: none; box-shadow: 0 2px 10px rgba(0,0,0,.09); border-radius: 10px; }
    .nav-pills .nav-link { color: #1a3a5c; font-weight: 500; }
    .nav-pills .nav-link.active { background-color: #1a3a5c; }
    /* estado rows */
    .row-ok         { background: #d1e7dd !important; }
    .row-falta      { background: #f8d7da !important; }
    .row-incompleto { background: #ffe5d0 !important; }
    .row-sin_datos  { background: #f8f9fa !important; }
    /* estado text */
    .est-ok         { color: #198754; font-weight: 600; }
    .est-falta      { color: #dc3545; font-weight: 600; }
    .est-incompleto { color: #fd7e14; font-weight: 600; }
    .est-sin_datos  { color: #6c757d; font-weight: 500; }
    /* card general header */
    .ind-ok         { border-left: 4px solid #198754; }
    .ind-falta      { border-left: 4px solid #dc3545; }
    .ind-parcial    { border-left: 4px solid #ffc107; }
    .ind-sin_fechas { border-left: 4px solid #6c757d; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4">
  <div class="container-lg">
    <a class="navbar-brand" href="{{ url_for('index') }}">
      <i class="bi bi-capsule-pill me-2"></i>MedControl
    </a>
    <div class="d-flex gap-2">
      <a href="{{ url_for('cargar_pdf') }}" class="btn btn-warning btn-sm fw-semibold">
        <i class="bi bi-file-earmark-pdf me-1"></i>Cargar PDF
      </a>
      <a href="{{ url_for('nuevo_paciente') }}" class="btn btn-outline-light btn-sm">
        <i class="bi bi-person-plus me-1"></i>Nuevo paciente
      </a>
    </div>
  </div>
</nav>

<div class="container-lg pb-5">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
        {{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
